// Compact system prompt - no full rules, Claude already knows them
// Only errata (changes from printed text) and behavior instructions
const SYSTEM = `You are an official Riftbound TCG rules judge. Answer based on official Riftbound rules and the errata below.

RULES: Apply standard Riftbound Core Rules (you know them). Key points:
- Golden Rule: card text beats rules text. Can't beats Can. DAMAYC.
- HOT FEPR: Handle Outstanding Tasks then Finalize-Execute-Pass-Resolve.
- May-triggered abilities: OPTIONAL to place on chain (Unleashed update).
- Costs in triggered ability instructions: paid on finalization.
- Replacement effects: controller of effect chooses order. Can be refused.
- Battlefield control cannot change while contested, combat/showdown ongoing, or item on chain.
- Tank assigned first, Backline assigned last in combat damage.
- Attachment: while attached, Rules Text INACTIVE, Effect Text + Might Bonus ACTIVE.
- Victory: points >= Victory Score AND greater than all opponents. 1v1=8, 2v2=11, FFA=8.
- For card texts not in errata: use web_search on piltoverarchive.com.

STYLE: Direct answers only. No intro, no outro, no "great question". Cite rule sections when helpful. Answer in the language of the question.

CURRENT ERRATA (always use these, never printed text):
` + ERRATA;

// ── SUPABASE HELPERS ──────────────────────────────────────────────────────────
async function sbFetch(path, opts = {}) {
  const r = await fetch(SB_URL + '/rest/v1/' + path, {
    headers: SB_HEADERS,
    ...opts
  });
  if (!r.ok) {
    const err = await r.text();
    throw new Error('Supabase error: ' + err);
  }
  const text = await r.text();
  return text ? JSON.parse(text) : null;
}

async function loadChats() {
  return await sbFetch('rb_chats?select=id,title,created_at&order=created_at.desc');
}

async function createChat(title) {
  const res = await sbFetch('rb_chats', {
    method: 'POST',
    body: JSON.stringify({ title })
  });
  return Array.isArray(res) ? res[0] : res;
}

async function deleteChat(id) {
  await sbFetch('rb_messages?chat_id=eq.' + id, { method: 'DELETE' });
  await sbFetch('rb_chats?id=eq.' + id, { method: 'DELETE' });
}

async function loadMessages(chatId) {
  return await sbFetch('rb_messages?chat_id=eq.' + chatId + '&order=created_at.asc&select=role,content');
}

async function saveMessage(chatId, role, content) {
  await sbFetch('rb_messages', {
    method: 'POST',
    body: JSON.stringify({ chat_id: chatId, role, content })
  });
}

async function updateChatTitle(id, title) {
  await sbFetch('rb_chats?id=eq.' + id, {
    method: 'PATCH',
    body: JSON.stringify({ title })
  });
}

function Thinking({ query }) {
  const [tick, setTick] = useState(0);
  useEffect(() => {
    const t = setInterval(() => setTick(n => n + 1), 500);
    return () => clearInterval(t);
  }, []);
  const labels = ['Denke nach…', 'Prüfe Regeln…', 'Prüfe Errata…'];
  const label = query ? 'Suche: „' + query + '"' : labels[tick % 3];
  const n = query ? 8 : 4;
  const color = query ? '#79c0ff' : '#c89b3c';
  return (
    <div style={{display:'flex',flexDirection:'column',gap:7}}>
      <div style={{display:'flex',alignItems:'center',gap:3,height:20}}>
        {Array.from({length:n}).map((_,i)=>(
          <div key={i} style={{width:3,borderRadius:3,background:color,height:20,
            animation:'bar 0.85s ease-in-out infinite',animationDelay:i*0.09+'s',

      <div style={{display:'flex',alignItems:'center',gap:6,fontSize:11,color:query?'#79c0ff':'#8b949e'}}>
        {query && <span style={{width:10,height:10,border:'1.5px solid #30363d',borderTopColor:'#79c0ff',
          borderRadius:'50%',animation:'spin .7s linear infinite',display:'inline-block',flexShrink:0}}/>}
        {label}
      </div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App() {
  const [apiKey, setApiKey] = useState(() => localStorage.getItem('rb_key') || '');
  const [chats, setChats] = useState([]);
  const [activeChatId, setActiveChatId] = useState(null);
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [sq, setSq] = useState(null);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [dbError, setDbError] = useState(null);
  const chatRef = useRef(null);
  const taRef = useRef(null);
  const histRef = useRef([]);

  useEffect(() => { if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight; }, [messages, loading]);

  // Load chats on mount
  useEffect(() => {
    if (!apiKey) return;
    loadChats().then(setChats).catch(e => setDbError(e.message));
  }, [apiKey]);

  // Load messages when chat changes
  useEffect(() => {
    if (!activeChatId) { setMessages([]); histRef.current = []; return; }
    loadMessages(activeChatId).then(msgs => {
      setMessages(msgs);
      histRef.current = msgs.map(m => ({ role: m.role, content: m.content }));
    }).catch(e => setDbError(e.message));
  }, [activeChatId]);

  const handleCreateChat = async (title) => {
    const chat = await createChat(title);
    const updated = await loadChats();
    setChats(updated);
    setActiveChatId(chat.id);
  };

  const handleDeleteChat = async (id) => {
    await deleteChat(id);
    const updated = await loadChats();
    setChats(updated);
    if (activeChatId === id) { setActiveChatId(null); setMessages([]); histRef.current = []; }
  };

  const handleRenameChat = async (id, title) => {
    await updateChatTitle(id, title.trim() || 'Chat');
    setChats(prev => prev.map(c => c.id === id ? {...c, title} : c));
  };

  const runLoop = async (msgs) => {
    const tools = [{ type: 'web_search_20250305', name: 'web_search' }];
    let m = [...msgs];
    for (let i = 0; i < 5; i++) {
      const r = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 600,
          system: SYSTEM,
          tools,
          messages: m
        })
      });
      const data = await r.json();
      if (data.error) throw new Error(data.error.message);
      const content = data.content || [];
      if (data.stop_reason === 'tool_use') {
        const tu = content.find(b => b.type === 'tool_use');
        if (tu?.name === 'web_search') setSq(tu.input?.query || '…');
        m.push({ role: 'assistant', content });
        const results = content.filter(b => b.type === 'tool_use')
          .map(b => ({ type: 'tool_result', tool_use_id: b.id, content: '' }));
        m.push({ role: 'user', content: results });
        continue;
      }
      return content.filter(b => b.type === 'text').map(b => b.text).join('\n').trim();
    }
    throw new Error('Zu viele Iterationen');
  };

  const send = async (override) => {
    const text = (override || input).trim();
    if (!text || loading) return;
    if (!activeChatId) { alert('Bitte zuerst einen Chat auswählen oder erstellen (☰ oben links)'); return; }
    setInput(''); setLoading(true); setSq(null);
    if (taRef.current) taRef.current.style.height = 'auto';

    const userMsg = { role: 'user', content: text };
    setMessages(prev => [...prev, userMsg]);
    histRef.current = [...histRef.current, userMsg];
    await saveMessage(activeChatId, 'user', text).catch(() => {});

    // Auto-rename chat from first message
    const isFirst = histRef.current.length === 1;
    if (isFirst) {
      const title = text.length > 40 ? text.slice(0, 40) + '…' : text;
      handleRenameChat(activeChatId, title);
    }

    try {
      const reply = await runLoop(histRef.current.slice(-12));
      const assistantMsg = { role: 'assistant', content: reply };
      histRef.current = [...histRef.current, assistantMsg];
      setMessages(prev => [...prev, assistantMsg]);
      await saveMessage(activeChatId, 'assistant', reply).catch(() => {});
    } catch(e) {
      const errMsg = { role: 'assistant', content: 'Fehler: ' + e.message };
      setMessages(prev => [...prev, errMsg]);
      histRef.current.pop();
    }
    setLoading(false); setSq(null);
    taRef.current?.focus();
  };

  const quickBtns = [
    ['HOT FEPR', 'Erkläre HOT FEPR kurz.'],
    ['Hidden', 'Wie funktioniert Hidden?'],
    ['Combat', 'Combat vs Non-Combat Showdown?'],
    ['Equip/Attach', 'Equip, Attach, Weaponmaster?'],
    ['XP/Hunt/Level', 'XP, Hunt und Level?'],
    ['Replacement', 'Replacement Effects?'],
    ['Gewinnen', 'Wie gewinnt man?'],
  ];

  const saveKey = k => { localStorage.setItem('rb_key', k); setApiKey(k); };

  if (!apiKey) return <ApiKeyModal onSave={saveKey}/>;

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100vh',background:'#0d1117',color:'#e6edf3'}}>
      <style>{'@keyframes bar{0%,100%{transform:scaleY(0.2);opacity:0.3}50%{transform:scaleY(1);opacity:1}}@keyframes spin{to{transform:rotate(360deg)}}@keyframes fadein{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}.msg-in{animation:fadein 0.15s ease-out}.sidebar-item:hover{background:#1f2937 !important}'}</style>

      <Sidebar chats={chats} activeChatId={activeChatId}
        onSelect={setActiveChatId} onCreate={handleCreateChat}
        onDelete={handleDeleteChat} onRename={handleRenameChat}
        open={sidebarOpen} onClose={()=>setSidebarOpen(false)}/>

      {/* Header */}
      <div style={{background:'#161b22',borderBottom:'1px solid #30363d',
        padding:'9px 14px',display:'flex',alignItems:'center',gap:10,flexShrink:0}}>
        <button onClick={()=>setSidebarOpen(true)} style={{background:'none',border:'none',
          color:'#8b949e',fontSize:18,cursor:'pointer',padding:'2px 4px',lineHeight:1}}>☰</button>
        <div style={{width:28,height:28,background:'linear-gradient(135deg,#c89b3c,#785a28)',
          borderRadius:7,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,flexShrink:0}}>⚖</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:13,fontWeight:600,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
            {activeChatId ? (chats.find(c=>c.id===activeChatId)?.title || 'Riftbound Schiedsrichter') : 'Riftbound Schiedsrichter'}
          </div>
          <div style={{fontSize:10,color:'#8b949e'}}>Haiku 4.5 · Errata · Live-Kartensuche</div>
        </div>
        <button onClick={()=>{localStorage.removeItem('rb_key');setApiKey('');}}
          title="API-Key ändern" style={{background:'none',border:'1px solid #30363d',
          borderRadius:5,color:'#8b949e',fontSize:11,padding:'2px 7px',cursor:'pointer'}}>🔑</button>
      </div>

      {dbError && (
        <div style={{background:'#1c0f0f',borderBottom:'1px solid #6e1a1a',padding:'8px 14px',fontSize:12,color:'#f85149'}}>
          ⚠ Supabase-Fehler: {dbError} — <button onClick={()=>setDbError(null)} style={{background:'none',border:'none',color:'#f85149',cursor:'pointer',textDecoration:'underline'}}>Ausblenden</button>
        </div>
      )}

      {/* Chat area */}
      <div ref={chatRef} style={{flex:1,overflowY:'auto',padding:'14px',display:'flex',flexDirection:'column',gap:11}}>
        {!activeChatId && (
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
            height:'100%',gap:12,color:'#484f58',textAlign:'center',padding:20}}>
            <div style={{fontSize:40}}>⚖</div>
            <div style={{fontSize:14,fontWeight:600,color:'#8b949e'}}>Riftbound Schiedsrichter</div>
            <div style={{fontSize:12,lineHeight:1.6}}>
              Chat über ☰ erstellen oder auswählen.<br/>
              Errata + Kartensuche. Haiku 4.5 (~0.1 Rp/Frage).
            </div>
            <button onClick={()=>setSidebarOpen(true)} style={{
              background:'#c89b3c',border:'none',borderRadius:8,color:'#0d1117',
              fontWeight:600,fontSize:13,padding:'9px 18px',cursor:'pointer',marginTop:4}}>
              + Neuen Chat starten
            </button>
          </div>
        )}
        {messages.map((m,i) => <Msg key={i} role={m.role} content={m.content}/>)}
        {loading && <Msg role="judge" content="" thinking sq={sq}/>}
      </div>

      {/* Quick buttons */}
      {activeChatId && (
        <div style={{padding:'0 12px 7px',display:'flex',gap:5,flexWrap:'wrap',flexShrink:0}}>
          {quickBtns.map(([l,q])=>(
            <button key={l} onClick={()=>send(q)} disabled={loading} style={{
              background:'#21262d',border:'1px solid #30363d',borderRadius:20,
              color:'#8b949e',fontSize:11,padding:'3px 9px',cursor:loading?'default':'pointer'}}>
              {l}
            </button>
          ))}
        </div>
      )}

      {/* Input */}
      {activeChatId && (
        <div style={{borderTop:'1px solid #30363d',background:'#161b22',
          padding:'9px 12px',display:'flex',gap:7,alignItems:'flex-end',flexShrink:0}}>
          <textarea ref={taRef} value={input}
            onChange={e=>{setInput(e.target.value);e.target.style.height='auto';e.target.style.height=Math.min(e.target.scrollHeight,100)+'px';}}
            onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}}
            placeholder="Regelfrage..." rows={1} disabled={loading}
            style={{flex:1,background:'#0d1117',border:'1px solid',
              borderColor:input?'#c89b3c':'#30363d',borderRadius:7,color:'#e6edf3',
              padding:'7px 10px',fontSize:13,fontFamily:'inherit',resize:'none',
              minHeight:36,maxHeight:100,outline:'none',transition:'border-color .2s'}}/>
          <button onClick={()=>send()} disabled={loading||!input.trim()} style={{
            background:loading||!input.trim()?'#3d2f12':'#c89b3c',border:'none',borderRadius:7,
            color:loading||!input.trim()?'#5d4a25':'#0d1117',fontWeight:600,fontSize:13,
            padding:'7px 13px',cursor:loading||!input.trim()?'default':'pointer',
            height:36,whiteSpace:'nowrap',transition:'all .2s',flexShrink:0}}>
            {loading?'…':'Senden ↗'}
          </button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
