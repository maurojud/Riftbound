<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#161b22">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RB Judge">
<title>Riftbound Schiedsrichter</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{height:100%;height:-webkit-fill-available}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  background:#0d1117;color:#e6edf3;-webkit-font-smoothing:antialiased;
  height:100dvh;overflow:hidden;position:fixed;width:100%
}
#root{height:100dvh;display:flex;flex-direction:column;overflow:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}
@keyframes bar{0%,100%{transform:scaleY(0.2);opacity:0.3}50%{transform:scaleY(1);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.mi{animation:fi 0.15s ease-out}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

const SB_URL = "https://ablijbnlplkvxxuqsvyx.supabase.co";
const SB_KEY = "sb_publishable_-xS_wT0nSSKtrmLuj84ejw__0ZRrwSn";
const EDGE_FN = SB_URL + "/functions/v1/dynamic-processor";

const sb = supabase.createClient(SB_URL, SB_KEY);

// ── THINKING ANIMATION ────────────────────────────────────────────────────────
function Thinking({ step }) {
  const [tick, setTick] = useState(0);
  useEffect(() => {
    const t = setInterval(() => setTick(n => n + 1), 700);
    return () => clearInterval(t);
  }, []);
  const labels = [
    'Suche relevante Regeln…',
    'Lese Regelabschnitte…',
    'Prüfe Errata…',
    'Prüfe Patches…',
    'Analysiere Interaktion…',
    'Prüfe Keywords…',
    'Kombiniere Regelabschnitte…',
    'Überprüfe Ausnahmen…',
    'Formuliere Antwort…',
  ];
  const label = step || labels[tick % labels.length];
  const n = 5;
  return (
    <div style={{display:'flex',flexDirection:'column',gap:8}}>
      <div style={{display:'flex',alignItems:'flex-end',gap:4,height:22}}>
        {Array.from({length:n}).map((_,i)=>(
          <div key={i} style={{width:4,borderRadius:4,background:'#c89b3c',height:22,
            animation:'bar 0.9s ease-in-out infinite',animationDelay:i*0.1+'s',
            transformOrigin:'bottom'}}/>
        ))}
      </div>
      <div style={{fontSize:12,color:'#8b949e',lineHeight:1.3}}>{label}</div>
    </div>
  );
}

// ── MESSAGE ───────────────────────────────────────────────────────────────────
function Msg({ role, content, thinking, step, sources }) {
  const isUser = role === 'user';
  const fmt = t => (t||'')
    .replace(/\*\*(.*?)\*\*/g,'<strong style="color:#c89b3c">$1</strong>')
    .replace(/`([^`]+)`/g,'<code style="background:#21262d;padding:1px 5px;border-radius:3px;font-family:monospace;font-size:11px;color:#c89b3c">$1</code>')
    .replace(/\n\n/g,'<br/><br/>').replace(/\n/g,'<br/>');

  return (
    <div className="mi" style={{display:'flex',gap:10,
      flexDirection:isUser?'row-reverse':'row',
      alignSelf:isUser?'flex-end':'flex-start',
      maxWidth:isUser?'78%':'92%'}}>
      <div style={{width:32,height:32,borderRadius:'50%',flexShrink:0,
        display:'flex',alignItems:'center',justifyContent:'center',
        fontSize:13,fontWeight:600,
        background:isUser?'#21262d':'linear-gradient(135deg,#c89b3c,#785a28)',
        color:isUser?'#8b949e':'#fff',border:isUser?'1px solid #30363d':'none'}}>
        {isUser?'Du':'⚖'}
      </div>
      <div>
        <div style={{padding:'11px 14px',borderRadius:12,fontSize:14,lineHeight:1.65,
          background:isUser?'#1f6feb':'#161b22',
          border:isUser?'none':'1px solid #30363d',
          color:isUser?'#fff':'#e6edf3',
          borderTopLeftRadius:isUser?12:3,borderTopRightRadius:isUser?3:12}}>
          {thinking
            ? <Thinking step={step}/>
            : <span dangerouslySetInnerHTML={{__html:fmt(content)}}/>
          }
        </div>
        {sources && sources.length > 0 && (
          <div style={{marginTop:5,display:'flex',gap:4,flexWrap:'wrap'}}>
            {sources.map((s,i)=>(
              <span key={i} style={{fontSize:10,color:'#484f58',background:'#161b22',
                border:'1px solid #21262d',borderRadius:4,padding:'1px 6px'}}>
                {s}
              </span>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ── AUTH SCREEN ───────────────────────────────────────────────────────────────
function AuthScreen({ onAuth }) {
  const [mode, setMode] = useState('login');
  const [email, setEmail] = useState('');
  const [pass, setPass] = useState('');
  const [apiKey, setApiKey] = useState('');
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');
  const [info, setInfo] = useState('');

  const submit = async () => {
    setErr(''); setInfo(''); setLoading(true);
    try {
      if (mode === 'login') {
        const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
        if (error) throw new Error(error.message);
        let { data: profile } = await sb.from('rb_profiles').select('api_key').eq('id', data.user.id).maybeSingle();
        let key = profile?.api_key || '';
        const pending = localStorage.getItem('rb_pk_' + email);
        if (!key && pending) {
          await sb.from('rb_profiles').upsert({ id: data.user.id, api_key: pending });
          localStorage.removeItem('rb_pk_' + email);
          key = pending;
        }
        onAuth(data.user, key);
      } else {
        if (!apiKey.startsWith('sk-')) throw new Error('API-Key muss mit sk- beginnen');
        if (pass.length < 6) throw new Error('Passwort: min. 6 Zeichen');
        const { data, error } = await sb.auth.signUp({ email, password: pass });
        if (error) throw new Error(error.message);
        if (data.session) {
          await sb.from('rb_profiles').upsert({ id: data.user.id, api_key: apiKey });
          onAuth(data.user, apiKey);
        } else {
          localStorage.setItem('rb_pk_' + email, apiKey);
          setInfo('Bestätigungs-Email gesendet. Bitte bestätigen, dann einloggen.');
          setMode('login');
        }
      }
    } catch(e) { setErr(e.message); }
    setLoading(false);
  };

  const inp = (val, set, ph, type='text') => (
    <input type={type} value={val} onChange={e=>set(e.target.value)}
      onKeyDown={e=>e.key==='Enter'&&submit()} placeholder={ph}
      style={{width:'100%',background:'#0d1117',border:'1px solid #30363d',
        borderRadius:8,color:'#e6edf3',padding:'11px 13px',fontSize:15,
        marginBottom:10,display:'block',outline:'none',fontFamily:'inherit'}}/>
  );

  return (
    <div style={{position:'fixed',inset:0,background:'#0d1117',display:'flex',
      alignItems:'center',justifyContent:'center',padding:20}}>
      <div style={{background:'#161b22',border:'1px solid #30363d',borderRadius:14,
        padding:26,maxWidth:360,width:'100%'}}>
        <div style={{fontSize:36,textAlign:'center',marginBottom:8}}>⚖</div>
        <h2 style={{fontSize:16,fontWeight:600,textAlign:'center',marginBottom:18}}>
          Riftbound Schiedsrichter
        </h2>
        <div style={{display:'flex',background:'#0d1117',borderRadius:8,padding:3,marginBottom:18}}>
          {['login','register'].map(m=>(
            <button key={m} onClick={()=>{setMode(m);setErr('');setInfo('');}} style={{
              flex:1,background:mode===m?'#21262d':'transparent',border:'none',
              borderRadius:6,color:mode===m?'#e6edf3':'#8b949e',
              fontSize:13,fontWeight:mode===m?600:400,padding:'7px',cursor:'pointer'}}>
              {m==='login'?'Einloggen':'Registrieren'}
            </button>
          ))}
        </div>
        {inp(email,setEmail,'E-Mail','email')}
        {inp(pass,setPass,'Passwort (min. 6 Zeichen)','password')}
        {mode==='register'&&inp(apiKey,setApiKey,'Anthropic API-Key (sk-ant-...)')}
        {err&&<div style={{fontSize:12,color:'#f85149',marginBottom:10,
          padding:'7px 9px',background:'#1c0f0f',borderRadius:6}}>{err}</div>}
        {info&&<div style={{fontSize:12,color:'#3fb950',marginBottom:10,
          padding:'7px 9px',background:'#0d1a0d',borderRadius:6}}>{info}</div>}
        <button onClick={submit} disabled={loading} style={{
          width:'100%',background:loading?'#3d2f12':'#c89b3c',border:'none',
          borderRadius:8,color:loading?'#5d4a25':'#0d1117',
          fontWeight:600,fontSize:14,padding:'11px',cursor:loading?'default':'pointer'}}>
          {loading?'…':mode==='login'?'Einloggen':'Account erstellen'}
        </button>
        {mode==='register'&&<p style={{fontSize:11,color:'#484f58',textAlign:'center',marginTop:10}}>
          API-Key: console.anthropic.com → API Keys
        </p>}
      </div>
    </div>
  );
}

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
function Sidebar({ chats, activeChatId, onSelect, onCreate, onDelete, onRename, onLogout, userEmail, open, onClose }) {
  const [title, setTitle] = useState('');
  const [creating, setCreating] = useState(false);
  const [createErr, setCreateErr] = useState('');
  const [editId, setEditId] = useState(null);
  const [editVal, setEditVal] = useState('');

  const handleCreate = async () => {
    const t = title.trim() || 'Neuer Chat';
    setCreating(true); setCreateErr('');
    try {
      await onCreate(t);
      setTitle('');
    } catch(e) { setCreateErr(e.message); }
    setCreating(false);
  };

  if (!open) return null;
  return (
    <div style={{position:'fixed',inset:0,zIndex:50,display:'flex'}}>
      <div style={{width:270,background:'#0d1117',borderRight:'1px solid #30363d',
        display:'flex',flexDirection:'column',height:'100%',flexShrink:0}}>
        <div style={{padding:'14px 16px',borderBottom:'1px solid #30363d'}}>
          <div style={{fontSize:11,color:'#484f58',marginBottom:3}}>Eingeloggt als</div>
          <div style={{fontSize:13,color:'#e6edf3',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{userEmail}</div>
        </div>
        <div style={{padding:'10px 12px',borderBottom:'1px solid #21262d'}}>
          <div style={{display:'flex',gap:6}}>
            <input value={title} onChange={e=>setTitle(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&!creating&&handleCreate()}
              placeholder="Chat-Titel..." style={{flex:1,background:'#161b22',
                border:'1px solid #30363d',borderRadius:7,color:'#e6edf3',
                padding:'8px 10px',fontSize:13,outline:'none'}}/>
            <button onClick={handleCreate} disabled={creating} style={{
              background:creating?'#3d2f12':'#c89b3c',border:'none',borderRadius:7,
              color:creating?'#5d4a25':'#0d1117',fontSize:13,fontWeight:600,
              padding:'8px 12px',cursor:creating?'default':'pointer',whiteSpace:'nowrap'}}>
              {creating?'…':'+ Neu'}
            </button>
          </div>
          {createErr&&<div style={{fontSize:11,color:'#f85149',marginTop:5}}>{createErr}</div>}
        </div>
        <div style={{flex:1,overflowY:'auto',padding:'6px 8px',display:'flex',flexDirection:'column',gap:2}}>
          {chats.length===0&&<div style={{fontSize:12,color:'#484f58',padding:'12px 8px',textAlign:'center'}}>Noch keine Chats</div>}
          {chats.map(c=>(
            <div key={c.id} onClick={()=>{onSelect(c.id);onClose();}}
              style={{padding:'9px 12px',borderRadius:7,cursor:'pointer',display:'flex',
                alignItems:'center',gap:6,
                borderLeft:c.id===activeChatId?'2px solid #c89b3c':'2px solid transparent',
                background:c.id===activeChatId?'#1a1500':'transparent'}}>
              {editId===c.id?(
                <input autoFocus value={editVal} onChange={e=>setEditVal(e.target.value)}
                  onKeyDown={e=>{
                    if(e.key==='Enter'){onRename(c.id,editVal);setEditId(null);}
                    if(e.key==='Escape')setEditId(null);
                  }}
                  onClick={e=>e.stopPropagation()}
                  style={{flex:1,background:'#21262d',border:'1px solid #c89b3c',
                    borderRadius:4,color:'#e6edf3',padding:'2px 6px',fontSize:13,outline:'none'}}/>
              ):(
                <span style={{flex:1,fontSize:13,color:'#e6edf3',
                  whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{c.title}</span>
              )}
              <div style={{display:'flex',gap:2,flexShrink:0}} onClick={e=>e.stopPropagation()}>
                <button onClick={()=>{setEditId(c.id);setEditVal(c.title);}}
                  style={{background:'none',border:'none',color:'#484f58',
                    fontSize:14,cursor:'pointer',padding:'2px 4px'}} title="Umbenennen">✎</button>
                <button onClick={()=>onDelete(c.id)}
                  style={{background:'none',border:'none',color:'#484f58',
                    fontSize:14,cursor:'pointer',padding:'2px 4px'}} title="Löschen">🗑</button>
              </div>
            </div>
          ))}
        </div>
        <div style={{padding:'10px 12px',borderTop:'1px solid #21262d'}}>
          <button onClick={onLogout} style={{width:'100%',background:'none',
            border:'1px solid #30363d',borderRadius:7,color:'#8b949e',
            fontSize:13,padding:'9px',cursor:'pointer'}}>Ausloggen</button>
        </div>
      </div>
      <div onClick={onClose} style={{flex:1,background:'rgba(0,0,0,0.5)'}}/>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(null);
  const [apiKey, setApiKey] = useState('');
  const [ready, setReady] = useState(false);
  const [chats, setChats] = useState([]);
  const [activeChatId, setActiveChatId] = useState(null);
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [thinkStep, setThinkStep] = useState(null);
  const [sidebar, setSidebar] = useState(false);
  const chatRef = useRef(null);
  const taRef = useRef(null);
  const histRef = useRef([]);

  useEffect(() => {
    if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
  }, [messages, loading]);

  // Restore session
  useEffect(() => {
    sb.auth.getSession().then(async ({ data }) => {
      if (data.session?.user) {
        const u = data.session.user;
        const { data: profile } = await sb.from('rb_profiles').select('api_key').eq('id', u.id).maybeSingle();
        setUser(u); setApiKey(profile?.api_key || '');
        const { data: c } = await sb.from('rb_chats').select('id,title,created_at')
          .eq('user_id', u.id).order('created_at', { ascending: false });
        setChats(c || []);
      }
      setReady(true);
    });
  }, []);

  // Load messages when chat changes
  useEffect(() => {
    if (!activeChatId) { setMessages([]); histRef.current = []; return; }
    sb.from('rb_messages').select('role,content')
      .eq('chat_id', activeChatId).order('created_at', { ascending: true })
      .then(({ data }) => {
        const msgs = data || [];
        setMessages(msgs);
        histRef.current = msgs.map(m => ({ role: m.role, content: m.content }));
      });
  }, [activeChatId]);

  const handleAuth = async (u, key) => {
    setUser(u); setApiKey(key);
    const { data: c } = await sb.from('rb_chats').select('id,title,created_at')
      .eq('user_id', u.id).order('created_at', { ascending: false });
    setChats(c || []);
  };

  const handleLogout = async () => {
    await sb.auth.signOut();
    setUser(null); setApiKey(''); setChats([]);
    setActiveChatId(null); setMessages([]); histRef.current = [];
    setSidebar(false);
  };

  const handleCreate = async (title) => {
    const { error } = await sb.from('rb_chats').insert({ user_id: user.id, title });
    if (error) throw new Error(error.message);
    const { data: c } = await sb.from('rb_chats').select('id,title,created_at')
      .eq('user_id', user.id).order('created_at', { ascending: false }).limit(1).single();
    const { data: all } = await sb.from('rb_chats').select('id,title,created_at')
      .eq('user_id', user.id).order('created_at', { ascending: false });
    setChats(all || []); setActiveChatId(c.id);
  };

  const handleDelete = async (id) => {
    await sb.from('rb_messages').delete().eq('chat_id', id);
    await sb.from('rb_chats').delete().eq('id', id).eq('user_id', user.id);
    const { data: all } = await sb.from('rb_chats').select('id,title,created_at')
      .eq('user_id', user.id).order('created_at', { ascending: false });
    setChats(all || []);
    if (activeChatId === id) { setActiveChatId(null); setMessages([]); histRef.current = []; }
  };

  const handleRename = async (id, title) => {
    const t = title.trim() || 'Chat';
    await sb.from('rb_chats').update({ title: t }).eq('id', id).eq('user_id', user.id);
    setChats(prev => prev.map(c => c.id===id ? {...c,title:t} : c));
  };

  const send = async (override) => {
    const text = (override || input).trim();
    if (!text || loading) return;
    if (!activeChatId) { setSidebar(true); return; }
    setInput(''); setLoading(true); setThinkStep('Suche relevante Regeln…');
    if (taRef.current) taRef.current.style.height = 'auto';

    const userMsg = { role: 'user', content: text };
    setMessages(prev => [...prev, userMsg]);
    histRef.current = [...histRef.current, userMsg];

    // Auto-title on first message
    if (histRef.current.length === 1) {
      const t = text.length > 45 ? text.slice(0,45)+'…' : text;
      handleRename(activeChatId, t);
    }

    try {
      setThinkStep('Suche relevante Regelabschnitte…');

      // Call edge function
      const r = await fetch(EDGE_FN, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + SB_KEY,
          'apikey': SB_KEY
        },
        body: JSON.stringify({
          action: 'ask',
          query: text,
          messages: histRef.current.slice(-10),
          apiKey,
          userId: user.id,
          chatId: activeChatId
        })
      });

      let data;
      try {
        data = await r.json();
      } catch(e) {
        throw new Error('Edge Function nicht erreichbar. Bitte prüfe ob die Edge Function in Supabase deployed ist.');
      }
      if (data.error) throw new Error(data.error);

      const replyText = data.reply || 'Keine Antwort erhalten.';
      const aMsg = { role: 'assistant', content: replyText, sources: data.sources || data.chunks_titles };
      histRef.current = [...histRef.current, { role: 'assistant', content: replyText }];
      setMessages(prev => [...prev, aMsg]);

    } catch(e) {
      setMessages(prev => [...prev, { role: 'assistant', content: 'Fehler: ' + e.message }]);
      histRef.current.pop();
    }

    setLoading(false); setThinkStep(null);
    taRef.current?.focus();
  };

  if (!ready) return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',
      height:'100dvh',background:'#0d1117',color:'#484f58',fontSize:14}}>Laden…</div>
  );

  if (!user) return <AuthScreen onAuth={handleAuth}/>;

  const activeTitle = chats.find(c=>c.id===activeChatId)?.title || 'Riftbound Schiedsrichter';

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100dvh',
      background:'#0d1117',color:'#e6edf3'}}>
      <style>{'@keyframes bar{0%,100%{transform:scaleY(0.2);opacity:0.3}50%{transform:scaleY(1);opacity:1}}@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}.mi{animation:fi 0.15s ease-out}'}</style>

      <Sidebar chats={chats} activeChatId={activeChatId}
        onSelect={setActiveChatId} onCreate={handleCreate}
        onDelete={handleDelete} onRename={handleRename}
        onLogout={handleLogout} userEmail={user.email}
        open={sidebar} onClose={()=>setSidebar(false)}/>

      {/* Header */}
      <div style={{background:'#161b22',borderBottom:'1px solid #30363d',
        padding:'12px 16px',display:'flex',alignItems:'center',
        gap:12,flexShrink:0,minHeight:58}}>
        <button onClick={()=>setSidebar(true)} style={{background:'none',border:'none',
          color:'#8b949e',fontSize:22,cursor:'pointer',padding:'6px 8px',
          lineHeight:1,margin:'-6px -4px'}}>☰</button>
        <div style={{width:34,height:34,background:'linear-gradient(135deg,#c89b3c,#785a28)',
          borderRadius:9,display:'flex',alignItems:'center',justifyContent:'center',
          fontSize:17,flexShrink:0}}>⚖</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:15,fontWeight:600,whiteSpace:'nowrap',
            overflow:'hidden',textOverflow:'ellipsis'}}>{activeTitle}</div>
          <div style={{fontSize:11,color:'#8b949e'}}>
            Regelwerk-DB · Haiku 4.5 · Live-Kartensuche
          </div>
        </div>
      </div>

      {/* Chat */}
      <div ref={chatRef} style={{flex:1,overflowY:'auto',padding:'16px 14px',
        display:'flex',flexDirection:'column',gap:14}}>
        {!activeChatId&&(
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',
            justifyContent:'center',height:'100%',gap:14,color:'#484f58',
            textAlign:'center',padding:20}}>
            <div style={{fontSize:48}}>⚖</div>
            <div style={{fontSize:15,fontWeight:600,color:'#8b949e'}}>Riftbound Schiedsrichter</div>
            <div style={{fontSize:13,lineHeight:1.7,maxWidth:280}}>
              295 Regelabschnitte · Alle Patches · Alle Errata<br/>
              Regeln werden aus der Datenbank geladen — keine Token verschwendet
            </div>
            <button onClick={()=>setSidebar(true)} style={{
              background:'#c89b3c',border:'none',borderRadius:10,
              color:'#0d1117',fontWeight:700,fontSize:15,
              padding:'13px 28px',cursor:'pointer',marginTop:4}}>
              + Neuen Chat starten
            </button>
          </div>
        )}
        {messages.map((m,i)=>(
          <Msg key={i} role={m.role} content={m.content} sources={m.sources}/>
        ))}
        {loading&&<Msg role="judge" content="" thinking={true} step={thinkStep}/>}
      </div>

      {/* Input */}
      <div style={{borderTop:'2px solid #30363d',background:'#161b22',
        padding:'12px 14px',paddingBottom:'calc(12px + env(safe-area-inset-bottom))',
        display:'flex',gap:10,alignItems:'flex-end',flexShrink:0,minHeight:66}}>
        <textarea ref={taRef} value={input}
          onChange={e=>{
            setInput(e.target.value);
            e.target.style.height='auto';
            e.target.style.height=Math.min(e.target.scrollHeight,110)+'px';
          }}
          onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}}
          onFocus={()=>{if(!activeChatId)setSidebar(true);}}
          placeholder={activeChatId?'Regelfrage…':'Chat auswählen ↗'}
          rows={1} disabled={loading}
          style={{flex:1,background:'#21262d',
            border:'2px solid '+(input?'#c89b3c':'#444c56'),
            borderRadius:10,color:'#e6edf3',padding:'10px 13px',
            fontSize:16,fontFamily:'inherit',resize:'none',
            WebkitAppearance:'none',minHeight:44,maxHeight:110,
            outline:'none',transition:'border-color .2s',
            opacity:activeChatId?1:0.5}}/>
        <button onClick={()=>send()} disabled={loading||!input.trim()||!activeChatId}
          style={{background:loading||!input.trim()||!activeChatId?'#3d2f12':'#c89b3c',
            border:'none',borderRadius:10,
            color:loading||!input.trim()||!activeChatId?'#5d4a25':'#0d1117',
            fontWeight:700,fontSize:15,padding:'0 18px',
            cursor:loading||!input.trim()||!activeChatId?'default':'pointer',
            height:44,whiteSpace:'nowrap',transition:'all .2s',flexShrink:0}}>
          {loading?'…':'Senden ↗'}
        </button>
      </div>
    </div>
  );
}

// Keyboard resize fix for mobile
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    const root = document.getElementById('root');
    if (root) root.style.height = window.visualViewport.height + 'px';
  });
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
