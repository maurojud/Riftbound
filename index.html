BEHAVIOUR:

CORE RULES (updated 2026-03-30, with Unleashed FAQ corrections 2026-04-29):

GOLDEN RULES: Card text > rules text. Can't beats Can. DAMAYC. Null ≠ Zero. Units=I/me, Gear/Spells=this, Battlefields=here.

PLAYING A CARD (Rules 370-389): Announce → choose targets+destinations → pay costs → enter chain → legality check step 5 → execute. Conditional permissive abilities checked at step 5, if not met → undo+return.

TRIGGERED ABILITIES (Rules 383, Unleashed): Structure = [trigger] → [extra condition?] → [you may?] → [cost within instruction?] → effect. "You may" at correct position = optional chain placement. Cost within instruction at correct position = base cost paid on finalization. If either appears later in text = paid/decided on resolution instead. Example: "When I die, recycle me to ready runes" → "recycle me to" = base cost. Example: "When I attack, you may pay [C]. If you do, X" → pay [C] = resolution cost (wrong position for base cost).

HOT FEPR (Rules 390-410): Handle Outstanding Tasks → Finalize → Execute → Pass → Resolve. Finalization no longer managed by cleanup (Unleashed).

BATTLEFIELD CONTROL (Rules 187, 323, corrected Unleashed FAQ): Rule 323.6: Players lose control of battlefields without their units if turn is open AND no Showdown/Combat ongoing there. Rule 316.5.b: Showdown staged in cleanup AFTER Contested status applied (not when uncontrolled). Rule 344.2: Showdown opens if Contested AND no units from different players there. Control cannot change while item on chain.

COMBAT (Rules 440-470): 1)Opening(designations, attack/defend triggers fire ONCE first time) 2)Initial Chain(attacker→everyone→defender) 3)Active Chain 4)Damage(Tank first, Backline last, lethal damage must be fully assigned before next unit) 5)Resolution HOT FEPR(cleanup,winner,conquer,remove designations). Winner = player with units remaining.

PRIVATE INFORMATION (new, Unleashed FAQ): A player cannot be compelled to perform an action on secret/private cards if the effect specifies a type or quality. They may ignore it instead.

PRIVATE INFORMATION (new, Unleashed FAQ): A player cannot be compelled to perform an action on secret/private cards if the effect specifies a type or quality. They may ignore it instead.

ATTACHMENT (Rules 716-725): While attached: Rules Text INACTIVE, Effect Text + Might Bonus ACTIVE. Inactive text still EXISTS and can be referenced.

REPLACEMENT EFFECTS (Rules 370-375): Controller chooses ORDER when multiple apply. Each applied in ONE sequence. Can be REFUSED. Inherits modifications of replaced event.

// ── SUPABASE HELPERS ──────────────────────────────────────────────────────────
async function dbLoadChats(userId) {
  const { data, error } = await sb.from('rb_chats')
    .select('id,title,created_at')
    .eq('user_id', userId)
    .order('created_at', { ascending: false });
  if (error) throw new Error(error.message);
  return data || [];
}

async function dbCreateChat(userId, title) {
  const { error } = await sb.from('rb_chats')
    .insert({ user_id: userId, title: title });
  if (error) throw new Error(error.message);
  // fetch newest chat
  const { data, error: e2 } = await sb.from('rb_chats')
    .select('id,title,created_at')
    .eq('user_id', userId)
    .order('created_at', { ascending: false })
    .limit(1)
    .single();
  if (e2) throw new Error(e2.message);
  return data;
}

async function dbDeleteChat(chatId, userId) {
  await sb.from('rb_messages').delete().eq('chat_id', chatId);
  const { error } = await sb.from('rb_chats').delete().eq('id', chatId).eq('user_id', userId);
  if (error) throw new Error(error.message);
}

async function dbRenameChat(chatId, userId, title) {
  const { error } = await sb.from('rb_chats')
    .update({ title: title })
    .eq('id', chatId)
    .eq('user_id', userId);
  if (error) throw new Error(error.message);
}

async function dbLoadMessages(chatId) {
  const { data, error } = await sb.from('rb_messages')
    .select('role,content')
    .eq('chat_id', chatId)
    .order('created_at', { ascending: true });
  if (error) throw new Error(error.message);
  return data || [];
}

async function dbSaveMessage(chatId, role, content) {
  const { error } = await sb.from('rb_messages')
    .insert({ chat_id: chatId, role: role, content: content });
  if (error) console.error('Save message error:', error.message);
}

async function dbLoadProfile(userId) {
  const { data } = await sb.from('rb_profiles')
    .select('api_key')
    .eq('id', userId)
    .maybeSingle();
  return data;
}

async function dbSaveProfile(userId, apiKey) {
  const { error } = await sb.from('rb_profiles')
    .upsert({ id: userId, api_key: apiKey }, { onConflict: 'id' });
  if (error) throw new Error(error.message);
}

// ── THINKING ANIMATION ────────────────────────────────────────────────────────
function Thinking({ query, step }) {
  const [tick, setTick] = useState(0);
  useEffect(() => {
    const t = setInterval(() => setTick(n => n + 1), 600);
    return () => clearInterval(t);
  }, []);

  // Varied thinking labels that rotate naturally
  const thinkLabels = [
    'Lese Regelwerk…',
    'Prüfe Errata…',
    'Analysiere Interaktion…',
    'Prüfe Keyword-Regeln…',
    'Schaue Regelabschnitt nach…',
    'Kombiniere Regeln…',
    'Prüfe Ausnahmen…',
    'Überprüfe Reihenfolge…',
  ];

  const searchLabels = [
    'Suche offizielle Quellen…',
    'Lese Kartendaten…',
    'Prüfe FAQ…',
    'Suche Errata-Updates…',
  ];

  let label;
  if (query) {
    label = '„' + query + '“';
  } else if (step) {
    label = step;
  } else {
    label = thinkLabels[tick % thinkLabels.length];
  }

  const isSearching = !!query;
  const n = isSearching ? 8 : 5;
  const color = isSearching ? '#79c0ff' : '#c89b3c';

  return (
    <div style={{display:'flex',flexDirection:'column',gap:8}}>
      <div style={{display:'flex',alignItems:'flex-end',gap:3,height:22}}>
        {Array.from({length:n}).map((_,i) => (
          <div key={i} style={{
            width:4,borderRadius:4,background:color,
            height:22,
            animation:'bar 0.9s ease-in-out infinite',
            animationDelay:i*0.08+'s',
            transformOrigin:'bottom'
          }}/>
        ))}
      </div>
      <div style={{display:'flex',alignItems:'center',gap:6,fontSize:12,
        color:isSearching?'#79c0ff':'#8b949e',maxWidth:220}}>
        {isSearching && <span style={{
          width:11,height:11,
          border:'1.5px solid #30363d',
          borderTopColor:'#79c0ff',
          borderRadius:'50%',
          animation:'spin .65s linear infinite',
          display:'inline-block',flexShrink:0
        }}/>}
        <span style={{lineHeight:1.3}}>{label}</span>
      </div>
    </div>
  );
}

  const isUser = role === 'user';
  const fmt = t => (t || '')
    .replace(/\*\*(.*?)\*\*/g, '<strong style="color:#c89b3c">$1</strong>')
    .replace(/`([^`]+)`/g, '<code style="background:#21262d;padding:1px 4px;border-radius:3px;font-family:monospace;font-size:11px;color:#c89b3c">$1</code>')
    .replace(/\n\n/g, '<br/><br/>')

      display:'flex', gap:8,
      flexDirection:isUser?'row-reverse':'row',
      alignSelf:isUser?'flex-end':'flex-start',
      maxWidth:isUser?'78%':'92%'
    }}>
      <div style={{
        width:32,height:32,borderRadius:'50%',flexShrink:0,
        display:'flex',alignItems:'center',justifyContent:'center',
        fontSize:12,fontWeight:600,
        background:isUser?'#21262d':'linear-gradient(135deg,#c89b3c,#785a28)',
        color:isUser?'#8b949e':'#fff',
        border:isUser?'1px solid #30363d':'none'
      }}>
        {isUser?'Du':'⚖'}
      </div>
      <div style={{
        padding:'11px 14px',borderRadius:12,fontSize:14,lineHeight:1.7,
        background:isUser?'#1f6feb':'#161b22',
        border:isUser?'none':'1px solid #30363d',
        color:isUser?'#fff':'#e6edf3',
        borderTopLeftRadius:isUser?11:3,
        borderTopRightRadius:isUser?3:11

// ── AUTH SCREEN ───────────────────────────────────────────────────────────────
function AuthScreen({ onAuth }) {
  const [mode, setMode] = useState('login');
  const [email, setEmail] = useState('');
  const [pass, setPass] = useState('');
  const [apiKey, setApiKey] = useState('');
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');
  const [info, setInfo] = useState('');

  const submit = async () => {
    setErr(''); setInfo(''); setLoading(true);
    try {
      if (mode === 'login') {
        const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
        if (error) throw new Error(error.message);
        let profile = await dbLoadProfile(data.user.id);
        let key = profile?.api_key || '';
        // Check for pending key stored before email confirmation
        const pending = localStorage.getItem('rb_pk_' + email);
        if (!key && pending) {
          await dbSaveProfile(data.user.id, pending);
          localStorage.removeItem('rb_pk_' + email);
          key = pending;
        }
        onAuth(data.user, key);
      } else {
        if (!apiKey.startsWith('sk-')) throw new Error('API-Key muss mit sk- beginnen');
        if (pass.length < 6) throw new Error('Passwort: mindestens 6 Zeichen');
        const { data, error } = await sb.auth.signUp({ email, password: pass });
        if (error) throw new Error(error.message);
        if (data.session) {
          // Auto-confirmed
          await dbSaveProfile(data.user.id, apiKey);
          onAuth(data.user, apiKey);
        } else {
          // Email confirmation required
          localStorage.setItem('rb_pk_' + email, apiKey);
          setInfo('Bestätigungs-Email gesendet. Bitte bestätigen, dann einloggen.');
          setMode('login');
        }
      }
    } catch(e) {
      setErr(e.message);
    }
    setLoading(false);
  };

  const field = (val, set, ph, type='text') => (
    <input
      type={type} value={val}
      onChange={e => set(e.target.value)}
      onKeyDown={e => e.key === 'Enter' && submit()}
      placeholder={ph}
      style={{
        width:'100%', background:'#0d1117',
        border:'1px solid #30363d', borderRadius:7,
        color:'#e6edf3', padding:'9px 11px',
        fontSize:13, marginBottom:10,
        display:'block', outline:'none',
        fontFamily:'inherit'
      }}
    />
  );

  return (
    <div style={{position:'fixed',inset:0,background:'#0d1117',
      display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div style={{background:'#161b22',border:'1px solid #30363d',
        borderRadius:14,padding:26,maxWidth:360,width:'100%'}}>
        <div style={{fontSize:32,textAlign:'center',marginBottom:8}}>&#9878;</div>
        <h2 style={{fontSize:15,fontWeight:600,textAlign:'center',marginBottom:18}}>
          Riftbound Schiedsrichter
        </h2>
        <div style={{display:'flex',background:'#0d1117',borderRadius:8,padding:3,marginBottom:18}}>
          {['login','register'].map(m => (
            <button key={m} onClick={()=>{setMode(m);setErr('');setInfo('');}} style={{
              flex:1,background:mode===m?'#21262d':'transparent',
              border:'none',borderRadius:6,
              color:mode===m?'#e6edf3':'#8b949e',
              fontSize:12,fontWeight:mode===m?600:400,
              padding:'6px',cursor:'pointer'
            }}>
              {m==='login'?'Einloggen':'Registrieren'}
            </button>
          ))}
        </div>
        {field(email, setEmail, 'E-Mail', 'email')}
        {field(pass, setPass, 'Passwort (min. 6 Zeichen)', 'password')}
        {mode==='register' && field(apiKey, setApiKey, 'Anthropic API-Key (sk-ant-...)')}
        {err && <div style={{fontSize:12,color:'#f85149',marginBottom:10,
          padding:'6px 8px',background:'#1c0f0f',borderRadius:5}}>{err}</div>}
        {info && <div style={{fontSize:12,color:'#3fb950',marginBottom:10,
          padding:'6px 8px',background:'#0d1a0d',borderRadius:5}}>{info}</div>}
        <button onClick={submit} disabled={loading} style={{
          width:'100%',
          background:loading?'#3d2f12':'#c89b3c',
          border:'none',borderRadius:7,
          color:loading?'#5d4a25':'#0d1117',
          fontWeight:600,fontSize:13,padding:'10px',
          cursor:loading?'default':'pointer'
        }}>
          {loading?'…':mode==='login'?'Einloggen':'Account erstellen'}
        </button>
        {mode==='register' && (
          <p style={{fontSize:11,color:'#484f58',textAlign:'center',marginTop:10}}>
            API-Key: console.anthropic.com &#8594; API Keys
          </p>
        )}
      </div>
    </div>
  );
}

            <input value={title} onChange={e=>setTitle(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&!creating&&handleCreate()}
              placeholder="Chat-Titel..."
              style={{
                flex:1,background:'#161b22',
                border:'1px solid #30363d',borderRadius:6,
                color:'#e6edf3',padding:'6px 9px',
                fontSize:12,outline:'none'
              }}/>
            <button onClick={handleCreate} disabled={creating} style={{
              background:creating?'#3d2f12':'#c89b3c',
              border:'none',borderRadius:6,
              color:creating?'#5d4a25':'#0d1117',
              fontSize:12,fontWeight:600,
              padding:'6px 10px',cursor:creating?'default':'pointer',
              whiteSpace:'nowrap'
            }}>
              {creating?'…':'+ Neu'}
            </button>
          </div>
          {createErr && (
            <div style={{fontSize:11,color:'#f85149',marginTop:5,lineHeight:1.4}}>
              Fehler: {createErr}
            </div>
          )}
        </div>
        {/* Chat list */}
        <div style={{flex:1,overflowY:'auto',padding:'6px 8px',
          display:'flex',flexDirection:'column',gap:2}}>
          {chats.length===0 && (
            <div style={{fontSize:12,color:'#484f58',padding:'10px 6px',textAlign:'center'}}>
              Noch keine Chats
            </div>
          )}
          {chats.map(c => (
            <div key={c.id}
              onClick={()=>{onSelect(c.id);onClose();}}
              style={{
                padding:'7px 10px',borderRadius:6,cursor:'pointer',
                display:'flex',alignItems:'center',gap:6,
                borderLeft: c.id===activeChatId?'2px solid #c89b3c':'2px solid transparent',
                background:c.id===activeChatId?'#1a1500':'transparent'
              }}>
              {editId===c.id ? (
                <input autoFocus value={editVal}
                  onChange={e=>setEditVal(e.target.value)}
                  onKeyDown={e=>{
                    if(e.key==='Enter'){onRename(c.id,editVal);setEditId(null);}
                    if(e.key==='Escape') setEditId(null);
                  }}
                  onClick={e=>e.stopPropagation()}
                  style={{
                    flex:1,background:'#21262d',
                    border:'1px solid #c89b3c',borderRadius:4,
                    color:'#e6edf3',padding:'2px 5px',
                    fontSize:12,outline:'none'
                  }}/>
              ) : (
                <span style={{
                  flex:1,fontSize:12,color:'#e6edf3',
                  whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'
                }}>{c.title}</span>
              )}
              <div style={{display:'flex',gap:2,flexShrink:0}}
                onClick={e=>e.stopPropagation()}>
                <button
                  onClick={()=>{setEditId(c.id);setEditVal(c.title);}}
                  style={{background:'none',border:'none',color:'#484f58',
                    fontSize:12,cursor:'pointer',padding:'1px 3px'}}
                  title="Umbenennen">&#9998;</button>
                <button
                  onClick={()=>onDelete(c.id)}
                  style={{background:'none',border:'none',color:'#484f58',
                    fontSize:12,cursor:'pointer',padding:'1px 3px'}}
                  title="Löschen">&#128465;</button>
              </div>
            </div>
          ))}
        </div>
        {/* Logout */}
        <div style={{padding:'10px 12px',borderTop:'1px solid #21262d'}}>
          <button onClick={onLogout} style={{
            width:'100%',background:'none',
            border:'1px solid #30363d',borderRadius:6,
            color:'#8b949e',fontSize:12,
            padding:'7px',cursor:'pointer'
          }}>Ausloggen</button>
        </div>
      </div>
      <div onClick={onClose} style={{flex:1,background:'rgba(0,0,0,0.5)'}}/>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(null);
  const [apiKey, setApiKey] = useState('');
  const [ready, setReady] = useState(false);
  const [chats, setChats] = useState([]);
  const [activeChatId, setActiveChatId] = useState(null);
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [sq, setSq] = useState(null);
  const [sidebar, setSidebar] = useState(false);
  const chatRef = useRef(null);
  const taRef = useRef(null);
  const histRef = useRef([]);

  // Auto-scroll
  useEffect(() => {
    if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
  }, [messages, loading]);

  // Check existing session
  useEffect(() => {
    sb.auth.getSession().then(async ({ data }) => {
      if (data.session?.user) {
        const u = data.session.user;
        const profile = await dbLoadProfile(u.id);
        setUser(u);
        setApiKey(profile?.api_key || '');
        const c = await dbLoadChats(u.id);
        setChats(c);
      }
      setReady(true);
    });
  }, []);

  // Load messages when chat changes
  useEffect(() => {
    if (!activeChatId) { setMessages([]); histRef.current = []; return; }
    dbLoadMessages(activeChatId).then(msgs => {
      setMessages(msgs);
      histRef.current = msgs.map(m => ({ role: m.role, content: m.content }));
    });
  }, [activeChatId]);

  const handleAuth = async (u, key) => {
    setUser(u); setApiKey(key);
    const c = await dbLoadChats(u.id);
    setChats(c);
  };

  const handleLogout = async () => {
    await sb.auth.signOut();
    setUser(null); setApiKey(''); setChats([]);
    setActiveChatId(null); setMessages([]);
    histRef.current = []; setSidebar(false);
  };

  const handleCreate = async (title) => {
    const chat = await dbCreateChat(user.id, title);
    const c = await dbLoadChats(user.id);
    setChats(c);
    setActiveChatId(chat.id);
    setSidebar(false);
  };

  const handleDelete = async (id) => {
    await dbDeleteChat(id, user.id);
    const c = await dbLoadChats(user.id);
    setChats(c);
    if (activeChatId === id) {
      setActiveChatId(null); setMessages([]);
      histRef.current = [];
    }
  };

  const handleRename = async (id, title) => {
    await dbRenameChat(id, user.id, title.trim() || 'Chat');
    setChats(prev => prev.map(c => c.id===id ? {...c,title:title.trim()||'Chat'} : c));
  };

  const runLoop = async (msgs) => {
    const tools = [{ type: 'web_search_20250305', name: 'web_search' }];
    let m = [...msgs];
    for (let i = 0; i < 5; i++) {
      const r = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 2500,
          system: SYSTEM,
          tools: tools,
          messages: m
        })
      });
      const data = await r.json();
      if (data.error) throw new Error(data.error.message);
      const content = data.content || [];
      if (data.stop_reason === 'tool_use') {
        const tu = content.find(b => b.type === 'tool_use');
        if (tu?.name === 'web_search') setSq(tu.input?.query || '…');
        m.push({ role: 'assistant', content });
        const results = content
          .filter(b => b.type === 'tool_use')
          .map(b => ({ type: 'tool_result', tool_use_id: b.id, content: '' }));
        m.push({ role: 'user', content: results });
        continue;
      }
      return content.filter(b => b.type==='text').map(b => b.text).join('\n').trim();
    }
    throw new Error('Zu viele Iterationen');
  };

  const send = async (txt) => {
    const text = (txt || input).trim();
    if (!text || loading) return;
    if (!activeChatId) { setSidebar(true); return; }
    setInput(''); setLoading(true); setSq(null);
    if (taRef.current) taRef.current.style.height = 'auto';

    const userMsg = { role: 'user', content: text };
    setMessages(prev => [...prev, userMsg]);
    histRef.current = [...histRef.current, userMsg];
    dbSaveMessage(activeChatId, 'user', text);

    // Auto-title on first message
    if (histRef.current.length === 1) {
      const t = text.length > 42 ? text.slice(0, 42) + '…' : text;
      handleRename(activeChatId, t);
    }

    try {
      const reply = await runLoop(histRef.current.slice(-12));
      const aMsg = { role: 'assistant', content: reply };
      histRef.current = [...histRef.current, aMsg];
      setMessages(prev => [...prev, aMsg]);
      dbSaveMessage(activeChatId, 'assistant', reply);
    } catch(e) {
      setMessages(prev => [...prev,
        { role: 'assistant', content: 'Fehler: ' + e.message }]);
      histRef.current.pop();
    }
    setLoading(false); setSq(null);
    taRef.current?.focus();
  };

  if (!ready) return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',
      height:'100vh',background:'#0d1117',color:'#484f58',fontSize:13}}>
      Laden…
    </div>
  );

  if (!user) return <AuthScreen onAuth={handleAuth}/>;

  const activeTitle = chats.find(c=>c.id===activeChatId)?.title || 'Riftbound Schiedsrichter';

  return (
    <div style={{
      display:'flex',flexDirection:'column',
      height:'100dvh',background:'#0d1117',color:'#e6edf3',display:'flex',flexDirection:'column',overflow:'hidden'
    }}>
      <Sidebar
        chats={chats} activeChatId={activeChatId}
        onSelect={setActiveChatId} onCreate={handleCreate}
        onDelete={handleDelete} onRename={handleRename}
        onLogout={handleLogout} userEmail={user.email}
        open={sidebar} onClose={()=>setSidebar(false)}
      />

      {/* Header */}
      <div style={{
        background:'#161b22',borderBottom:'1px solid #30363d',
        padding:'12px 16px',display:'flex',alignItems:'center',
        gap:12,flexShrink:0,minHeight:56
      }}>
        <button onClick={()=>setSidebar(true)} style={{
          background:'none',border:'none',color:'#8b949e',
          fontSize:22,cursor:'pointer',padding:'6px 8px',lineHeight:1,
          margin:'-6px -4px'
        }}>&#9776;</button>
        <div style={{
          width:34,height:34,flexShrink:0,
          background:'linear-gradient(135deg,#c89b3c,#785a28)',
          borderRadius:9,display:'flex',alignItems:'center',
          justifyContent:'center',fontSize:17
        }}>&#9878;</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:15,fontWeight:600,
            whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
            {activeTitle}
          </div>
          <div style={{fontSize:11,color:'#8b949e'}}>
            Sonnet 4.6 &#183; Errata &#183; Live-Kartensuche
          </div>
        </div>
      </div>

      {/* Chat */}
      <div ref={chatRef} style={{
        flex:1,overflowY:'auto',padding:'16px 14px',
        display:'flex',flexDirection:'column',gap:14
      }}>
        {!activeChatId && (
          <div style={{
            display:'flex',flexDirection:'column',
            alignItems:'center',justifyContent:'center',
            height:'100%',gap:14,color:'#484f58',
            textAlign:'center',padding:20
          }}>
            <div style={{fontSize:44}}>&#9878;</div>
            <div style={{fontSize:14,fontWeight:600,color:'#8b949e'}}>
              Riftbound Schiedsrichter
            </div>
            <div style={{fontSize:12,lineHeight:1.7}}>
              Tippe &#9776; oben links um einen Chat zu erstellen.
            </div>
            <button onClick={()=>setSidebar(true)} style={{
              background:'#c89b3c',border:'none',borderRadius:10,
              color:'#0d1117',fontWeight:700,fontSize:15,
              padding:'13px 28px',cursor:'pointer'
            }}>
              + Neuen Chat starten
            </button>
          </div>
        )}
        {messages.map((m,i) => (
          <Msg key={i} role={m.role} content={m.content}/>
        ))}
        {loading && <Msg role="judge" content="" thinking={true} sq={sq}/>}
      </div>

      {/* Input */}
      <div style={{
          borderTop:'2px solid #30363d',background:'#161b22',
          padding:'12px 14px',paddingBottom:'calc(12px + env(safe-area-inset-bottom))',
          display:'flex',gap:10,
          alignItems:'flex-end',flexShrink:0,minHeight:64
        }}>
          <textarea ref={taRef} value={input}
            onChange={e => {
              setInput(e.target.value);
              e.target.style.height = 'auto';
              e.target.style.height = Math.min(e.target.scrollHeight, 110) + 'px';
            }}
            onKeyDown={e => {
              if (e.key==='Enter' && !e.shiftKey) {
                e.preventDefault(); send();
              }
            }}
            onFocus={() => { if (!activeChatId) setSidebar(true); }}
            placeholder={activeChatId ? 'Regelfrage...' : 'Chat auswählen oder erstellen ↗'}
            rows={1} disabled={loading}
            style={{
              flex:1,background:'#21262d',
              border:'2px solid ' + (input?'#c89b3c':'#444c56'),
              borderRadius:10,color:'#e6edf3',
              padding:'10px 13px',fontSize:16,
              fontFamily:'inherit',resize:'none',WebkitAppearance:'none',
              minHeight:44,maxHeight:130,outline:'none',
              transition:'border-color .2s',
              opacity: activeChatId ? 1 : 0.5
            }}/>
          <button onClick={()=>send()} disabled={loading||!input.trim()||!activeChatId} style={{
            background:loading||!input.trim()||!activeChatId?'#3d2f12':'#c89b3c',
            border:'none',borderRadius:10,
            color:loading||!input.trim()||!activeChatId?'#5d4a25':'#0d1117',
            fontWeight:700,fontSize:15,padding:'0 18px',
            cursor:loading||!input.trim()||!activeChatId?'default':'pointer',
            height:44,whiteSpace:'nowrap',
            transition:'all .2s',flexShrink:0
          }}>
            {loading?'…':'Senden ↗'}
          </button>
        </div>
    </div>
  );
}

// Mobile keyboard fix: resize root when keyboard opens/closes
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    const root = document.getElementById('root');
    if (root) {
      root.style.height = window.visualViewport.height + 'px';
    }
  });
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
